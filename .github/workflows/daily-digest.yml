name: Daily Tech Digest

on:
  schedule:
    # 每天 UTC 23:00（北京时间早上 7:00）自动运行
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run daily digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
          V2EX_TOKEN: ${{ secrets.V2EX_TOKEN }}
        run: uv run python daily_run.py

      - name: Build site
        run: |
          mkdir -p site
          # 复制最新的 HTML 作为 index.html
          latest=$(ls -t output/digest-*.html 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            cp "$latest" site/index.html
            # 也保留历史文件
            cp output/digest-*.html site/ 2>/dev/null || true
            cp output/digest-*.json site/ 2>/dev/null || true
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true  # 保留历史文件
